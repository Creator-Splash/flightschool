flightschool_turret_template:
  Type: SILVERFISH
  Display: "&a||||||||||||||||||||||||||||||||||||||||||||||||||"
  Faction: turret
  Health: 150
  Options:
    Invisible: true
    Silent: true
    PreventBlockInfection: true
    NoGravity: true
    Despawn: false
    Collidable: false
    PreventOtherDrops: true
    KnockbackImmune: true
  Attributes:
    KnockbackResistance: 1.0
  AIGoalSelectors:
  - clear
  AITargetSelectors:
  - clear
  Skills:
  - velocity{mode=set;x=0;y=0;z=0} @self ~onTimer:1
  - skill{s=[
      - effect:particles{p=explosion_emitter;a=3;hS=1;vS=1}
      - sound{s=entity.generic.explode;p=0}
    ]} @self ~onDeath
  - model{m=turret;ride=true;drive=true;lpitch=true;lyaw=false} @self ~onSpawnOrLoad
  - setrotation{yaw=0;pitch=0} @self ~onSpawn
  - skill{s=Turret_Mount_Mechanic} @trigger ~onInteract
  - skill{s=Turret_Mount_Mechanic} @trigger ~onSignal:mountCannon
  - setmodeltag{mid=turret;pid=nametag;scale=3,3,3;v=true;t="<caster.name>"} @self ~onSpawn
  - setname{name="&a||||||||||||||||||||||||||||||||||||||||||||||||||"} @self ~onDamaged ?healthpercent{p=>98%}
  - setname{name="&a|||||||||||||||||||||||||||||||||||||||||||||||||&c|"} @self ~onDamaged ?healthpercent{p=>96%} ?healthpercent{p=<98%}
  - setname{name="&a||||||||||||||||||||||||||||||||||||||||||||||||&c||"} @self ~onDamaged ?healthpercent{p=>94%} ?healthpercent{p=<96%}
  - setname{name="&a|||||||||||||||||||||||||||||||||||||||||||||||&c|||"} @self ~onDamaged ?healthpercent{p=>92%} ?healthpercent{p=<94%}
