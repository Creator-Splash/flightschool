############################################################################################
############################################################################################
############################################################################################

plane_yellow:
  Type: IRON_GOLEM
  Display: plane_yellow
  Faction: plane_yellow
  Health: 10
  Options:
    Silent: true
    MovementSpeed: 1
    Collidable: true
    PreventOtherDrops: true
    Despawn: false
  AIGoalSelectors:
  - clear
  AITargetSelectors:
  - clear
  Skills:
  - model{m=<caster.type.name>;drive=true;ride=true} @self ~onSpawn
  - setvariable{var=caster.beam;val=beam_yellow;type=STRING} @self ~onSpawn
  - setvariable{var=caster.color;val=#fad428;type=STRING} @self ~onSpawn
  - skill{s=plane_yellow_mount} @trigger ~onInteract ~onSignal:mountPlane
  - skill{s=plane_run;cd=0.2} @self ~onInteract
  - skill{s=plane_yellow_particles} @self ~onTimer:1 ?hasTag{t=plane_drive_on}
  - skill{s=plane_movement} @modelpassengers{p=seat} ~onTimer:1 ?hasTag{t=plane_drive_on}
  - lockmodel{l=false} @self ~onTimer:5 ?onGround


