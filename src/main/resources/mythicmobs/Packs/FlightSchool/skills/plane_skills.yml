###########################################################################################
###########################################################################################
###########################################################################################

plane_run:
  Conditions:
  - hasTag{t=plane_drive_on}
  Skills:
  - potion{t=SPEED;l=4;d=10;p=false;i=false} @trigger
  - aura{n=plane_run;d=10}

###########################################################################################
###########################################################################################
###########################################################################################

plane_movement:
  TargetConditions:
  - pitch{p=-89to89} orelsecast plane_lock
  Skills:
  - lockmodel{l=false} @self
  - look{ho=false;i=true;f=true} @targetLoc{fo=-15;y=-1.3}
  - lunge{o=true} @modelpart{p=look}
  - lunge{o=true;v=1} @modelpart{p=look} ?hasAura{n=plane_run}

plane_lock:
  Skills:
  - lockmodel{l=true} @self
  - lunge{o=true} @modelpart{p=look}

