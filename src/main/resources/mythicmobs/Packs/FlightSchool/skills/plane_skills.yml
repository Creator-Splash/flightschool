
###########################################################################################
###########################################################################################
###########################################################################################

plane_start:
  Conditions:
  - hasTag{t=plane_on} orelsecast plane_on
  - hasTag{t=plane_on} castinstead plane_off
plane_on:
  Skills:
  - lockmodel{l=false}
  - tagadd{t=plane_on}
  - tagadd{t=plane_pre_look}
  - state{s=on}
  - target @trigger
  - cancelSkill ?!hasTag{t=plane_on}
  - tagremove{t=plane_pre_look}
  - tagadd{t=plane_drive_on}
plane_off:
  Skills:
  - lockmodel{l=true}
  - tagremove{t=plane_on}
  - tagremove{t=plane_pre_look}
  - state{s=on;r=true}
  - tagremove{t=plane_drive_on}

###########################################################################################
###########################################################################################
###########################################################################################

plane_yellow_mount:
  Skills:
  - mountmodel{mid=<caster.type.name>;pbone=seat;driver=false;
    mode=[
      - skill{s=plane_on;cd=0.2} @self
      - potion{t=INVISIBILITY;d=2;p=false;i=false}
      - skill{s=plane_yellow_shot} ?variableEquals{var=skill.meg:jump;value=1}
    ]} @trigger ~onInteract
